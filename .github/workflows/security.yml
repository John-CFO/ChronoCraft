name: Security CI

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  # ---------------------------
  # FUNCTIONS (Backend / Firebase)
  # ---------------------------
  functions-security:
    name: Functions Security
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm exec tsc -- --noEmit

      - name: ESLint
        run: npm run lint

      - name: Unit Tests
        run: npm run test:unit

      - name: Integration Tests
        run: npm run test:integration

      - name: E2E Tests
        run: npm run test:e2e

  # ---------------------------
  # ROOT (Expo App)
  # ---------------------------
  app-security:
    name: Expo App Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (Expo)
        run: npm exec tsc --noEmit --project tsconfig.json

      - name: ESLint (Expo)
        run: npm exec eslint . --max-warnings=0

  # ---------------------------
  # FIREBASE RULES (no Node build)
  # ---------------------------
  rules-security:
    name: Firebase Rules Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Validate Firestore Rules
        run: firebase deploy --only firestore:rules --dry-run

      - name: Validate Storage Rules
        run: firebase deploy --only storage --dry-run

  # ---------------------------
  # DEPENDENCY SECURITY (global)
  # ---------------------------
  dependency-security:
    name: Dependency Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (report)
        run: npm audit || true

      - name: Check for critical vulnerabilities only
        run: npm audit --audit-level=critical

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten
