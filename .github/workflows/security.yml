name: Security CI

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pull-requests: read

jobs:
  # ---------------------------
  # FUNCTIONS (Backend / Firebase)
  # ---------------------------
  functions-security:
    name: Functions Security
    runs-on: ubuntu-latest
    env:
      GCLOUD_PROJECT: demo-test
      FIREBASE_PROJECT: demo-test

    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm exec tsc -- --noEmit

      - name: ESLint
        run: npm run lint

      - name: Unit Tests
        run: npm run test:unit

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Integration Tests
        run: npm run test:integration
        env:
          RATE_LIMIT_HMAC_KEY: test-key

      # -------------------------
      # E2E RUN (separate Emulator Lifecycle!)
      # -------------------------
      - name: E2E Tests
        run: npm run test:e2e
        working-directory: functions
        env:
          RATE_LIMIT_HMAC_KEY: test-key

      # -------------------------
      # RACE RUN (separate Emulator Lifecycle!)
      # -------------------------
      - name: Race Tests
        run: npm run test:race
        working-directory: functions
        env:
          RATE_LIMIT_HMAC_KEY: test-key

  # ---------------------------
  # ROOT (Expo App)
  # ---------------------------
  app-security:
    name: Expo App Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (Expo)
        run: npx tsc -p ./tsconfig.json --noEmit

      - name: ESLint (Expo)
        run: npx eslint . --max-warnings=0

  # ---------------------------
  # FIREBASE RULES (no Node build)
  # ---------------------------
  rules-security:
    name: Firebase Rules Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Validate Firestore Rules
        run: firebase deploy --only firestore:rules --dry-run --project chrono-craft-worktime-manager

      - name: Validate Storage Rules
        run: firebase deploy --only storage --dry-run

  # ---------------------------
  # DEPENDENCY SECURITY (global)
  # ---------------------------
  dependency-security:
    name: Dependency Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (report)
        run: npm audit || true

      - name: Check for critical vulnerabilities only
        run: npm audit --omit=dev --audit-level=critical

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten
